name: Security - Checkmarx One (CLI Local)

on:
  push:

jobs:
  checkmarx-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkmarx CLI
        run: |
          curl -s https://raw.githubusercontent.com/Checkmarx/ast-cli/main/install.sh | bash

      - name: Run Checkmarx Scan
        run: |
          ./cx scan create \
            --base-uri https://eu.ast.checkmarx.net \
            --tenant beta_nova8 \
            --client-id ${{ secrets.CX_CLIENT_ID }} \
            --client-secret ${{ secrets.CX_CLIENT_SECRET }} \
            --project-name "Desafio Time B - mern-amazona-docker" \
            --branch main \
            --scan-types sast,sca,iac-security \
            --report-format sarif \
            --output-path .
