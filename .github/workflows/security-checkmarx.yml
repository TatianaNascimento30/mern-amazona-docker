name: Security - Checkmarx One (CLI Docker)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  checkmarx-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkmarx Scan via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            checkmarx/ast-cli:latest scan create \
            --source-dir /src \
            --base-uri https://eu.ast.checkmarx.net \
            --tenant beta_nova8 \
            --client-id ${{ secrets.CX_CLIENT_ID }} \
            --client-secret ${{ secrets.CX_CLIENT_SECRET }} \
            --project-name "Desafio Time B - mern-amazona-docker" \
            --branch ${{ github.ref }} \
            --scan-types sast,sca,iac-security \
            --report-format sarif \
            --output-path /src

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cx_result.sarif
