name: Security - Checkmarx One (SAST, SCA, IaC)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  checkmarx-one-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Checkmarx CLI
        run: |
          curl -L https://github.com/Checkmarx/ast-cli/releases/latest/download/ast-cli_linux_x64.tar.gz -o cx.tar.gz
          tar -xzf cx.tar.gz
          chmod +x cx

      - name: Run Checkmarx Scan
        run: |
          ./cx scan create \
            --base-uri https://eu.ast.checkmarx.net \
            --tenant beta_nova8 \
            --client-id ${{ secrets.CX_CLIENT_ID }} \
            --client-secret ${{ secrets.CX_CLIENT_SECRET }} \
            --project-name "Desafio Time B - mern-amazona-docker" \
            --branch ${{ github.ref }} \
            --scan-types sast,sca,iac-security \
            --report-format sarif \
            --output-path .

      - name: Upload SARIF file to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cx_result.sarif
